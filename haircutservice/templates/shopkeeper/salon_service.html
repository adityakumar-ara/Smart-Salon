{% extends "main.html" %}
{% load static %}
 <link rel="stylesheet" href="{% static 'css/salon.css' %}">
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">

            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            {% endfor %}
            {% endif %}

            <div class="card shadow border-0 rounded-4 p-4 bg-white">
                <div class="card-body">
                    <h3 class="card-title fw-bold text-dark mb-4 text-center">Add New Service 💇‍♂️</h3>

                    <form action="{% url 'add_service' %}" method="POST" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-semibold text-secondary">Service Name:</label>
                            <input type="text" name="service_name" class="form-control"
                                placeholder="e.g., Haircut, Beard Trimming" required />
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold text-secondary">Price (₹):</label>
                            <input type="number" name="service_price" class="form-control"
                                placeholder="Enter Service Price" min="0" required />
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold text-secondary">Service Image:</label>
                            <input type="file" name="service_image" class="form-control" accept="image/*" required />
                            <div class="form-text text-muted small">Achi photo lagayein jo customers ko pasand aaye.
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold text-secondary">About Service:</label>
                            <textarea name="about_service" class="form-control" rows="4"
                                placeholder="Write a short description about this service..." required></textarea>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-warning btn-lg fw-bold shadow-sm py-2 text-dark">
                                <i class="fas fa-plus-circle me-1"></i> Add Service
                            </button>
                            <button onclick="history.back()" class="btn btn-outline-dark fw-bold shadow-sm px-4">
                                <i class="fas fa-arrow-left me-2"></i> Go Back
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
